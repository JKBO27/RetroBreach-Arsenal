<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RBreach Weapons Database</title>

<style>
body{
  background:#2f2f2f;
  color:white;
  font-family:Arial;
  padding:20px;
}

h1{
  text-align:center;
}

.categoria{
  margin-top:40px;
}

.arma{
  background:#3b3b3b;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>RBreach Weapons Database</h1>

<div id="contenedor"></div>

<script>

fetch("armas.json")
.then(res => res.json())
.then(data => {

  const contenedor = document.getElementById("contenedor")

  for (const categoria in data){

    const divCategoria = document.createElement("div")
    divCategoria.className = "categoria"

    const titulo = document.createElement("h2")
    titulo.textContent = categoria.replace("_"," ").toUpperCase()

    divCategoria.appendChild(titulo)

    data[categoria].forEach(arma => {

      const divArma = document.createElement("div")
      divArma.className = "arma"

      divArma.innerHTML = `
      <b>${arma.nombre}</b><br>
      Tier: ${arma.tier} | Rareza: ${arma.rareza}<br>
      Daño cabeza: ${arma.dano_cabeza} | Daño cuerpo: ${arma.dano_cuerpo}<br>
      Cadencia: ${arma.cadencia}<br>
      Cargador: ${arma.cargador} | Reserva: ${arma.reserva_maxima}
      `

      divCategoria.appendChild(divArma)

    })

    contenedor.appendChild(divCategoria)

  }

})

</script>

</body>
</html>
