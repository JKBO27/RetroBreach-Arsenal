  :root {
    --bg: #0d0d0d;
    --surface: #111111;
    --surface2: #181818;
    --surface3: #1e1e1e;
    --border: #000;
    --border2: #2a2a2a;
    --accent: #8a9ba8;
    --accent2: #b0c4d0;
    --accent-warm: #7a8a6a;
    --metal-light: #6e7e8a;
    --metal-dark: #3a4550;
    --text: #c8d4d8;
    --text-dim: #556070;
    --text-bright: #e0eaee;
    --tier1: #5a8aaa; --tier2: #6a9a6a; --tier3: #9a8a5a; --tier4: #8a6a9a;
    --comun: #778888; --poco_comun: #6a9a6a; --inusual: #5a8aaa; --rara: #8a6a9a; --muy_rara: #9a7060;
    --win: #6a9a6a; --lose: #9a6a5a;
    --scanline: rgba(0,0,0,0.35);
    --tex1: url('https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/5/a/6/5a6c872f714b53223fb0be006af4d8a8c49cc73e.png');
    --tex2: url('https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/optimized/5X/c/b/2/9/cb293d819c45f471372ce6abe9975205ffff063b_2_500x500.png');
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  /* ── SCANLINES CRT ── */
  body {
    background: #000;
    color: var(--text);
    font-family: 'PressStart2P', monospace;
    min-height: 100vh;
    font-size: 30px;
    line-height: 1.8;
    image-rendering: pixelated;
    background-image: url('https://media.discordapp.net/attachments/1473017512437219580/1480329663611142224/Background.png?ex=69af47ef&is=69adf66f&hm=8f7ae3bfcb39b35454954a125997c6452f048f7f086f754d5a3f1afe1a1b56fc&=&format=webp&quality=lossless');
    background-repeat: no-repeat;
    background-position: center top;
    background-attachment: fixed;
    background-size: auto 100vh;
  }

  /* emblema esquina */
  #corner-emblem {
    position: fixed;
    bottom: 18px;
    right: 18px;
    width: 56px;
    height: 56px;
    opacity: 0.18;
    z-index: 9997;
    pointer-events: none;
    filter: grayscale(1) brightness(1.2);
  }

  /* capa scanlines fija */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.15) 3px,
        rgba(0,0,0,0.15) 4px
      );
    pointer-events: none;
    z-index: 9999;
  }

  /* viñeta de pantalla */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 70%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 3px solid #000;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 4px 0 #000, inset 0 1px 0 rgba(255,255,255,0.04);
    background-image: var(--tex2);
    background-size: 400px;
    background-blend-mode: overlay;
  }

  .header-left { display:flex; flex-direction:column; gap:4px; flex:1; }

  header h1 {
    font-family: 'PressStart2P', monospace;
    font-size: .75rem;
    color: var(--accent2);
    letter-spacing: .06em;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(176,196,208,0.4), 2px 2px 0 #000;
  }

  header p {
    font-family: 'PressStart2P', monospace;
    font-size: .45rem;
    color: var(--text-dim);
    letter-spacing: .04em;
  }

  header span {
    font-family: 'PressStart2P', monospace;
    font-size: .45rem;
    color: var(--text-dim);
    border: 1px solid #000;
    background: var(--surface2);
    padding: 3px 8px;
    box-shadow: 2px 2px 0 #000;
  }

  .header-actions { display:flex; gap:8px; align-items:center; flex-shrink:0; }

  .btn-lang {
    background: var(--surface2);
    border: 2px solid #000;
    color: var(--text-dim);
    padding: 5px 10px;
    font-family: 'PressStart2P', monospace;
    font-size: .5rem;
    letter-spacing: .06em;
    cursor: pointer;
    transition: all .1s;
    box-shadow: 2px 2px 0 #000;
    text-transform: uppercase;
  }
  .btn-lang:hover { background: var(--surface3); color: var(--accent2); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #000; }
  .btn-lang.active { border-color: var(--accent); color: var(--accent2); background: rgba(138,155,168,.12); box-shadow: 2px 2px 0 #000; }

  .btn-discord {
    background: rgba(60,70,120,.2);
    border: 2px solid #000;
    color: #8891c8;
    padding: 5px 12px;
    font-family: 'PressStart2P', monospace;
    font-size: .5rem;
    letter-spacing: .06em;
    cursor: pointer;
    text-decoration: none;
    transition: all .1s;
    box-shadow: 2px 2px 0 #000;
    white-space: nowrap;
    display: inline-block;
  }
  .btn-discord:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #000; background: rgba(60,70,120,.35); }

  /* ── TABS ── */
  .view-tabs {
    display: flex;
    padding: 0 32px;
    background: var(--surface2);
    border-bottom: 3px solid #000;
    box-shadow: 0 3px 0 #000;
    position: sticky;
    top: 0;
    z-index: 190;
  }

  .view-tab {
    font-family: 'PressStart2P', monospace;
    font-size: .5rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
    transition: all .1s;
    background: none;
    border-top: none; border-left: none; border-right: none;
  }
  .view-tab:hover { color: var(--text); background: rgba(255,255,255,.03); }
  .view-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 8px 32px;
    background: var(--surface);
    border-bottom: 2px solid #000;
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    box-shadow: 0 2px 0 #000;
    position: sticky;
    top: 46px;
    z-index: 180;
  }
  .toolbar-sep { width: 2px; height: 18px; background: #000; margin: 0 4px; }

  .filter-btn {
    background: var(--surface2);
    border: 2px solid #000;
    color: var(--text-dim);
    padding: 4px 10px;
    font-family: 'PressStart2P', monospace;
    font-size: .45rem;
    letter-spacing: .04em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .1s;
    box-shadow: 2px 2px 0 #000;
  }
  .filter-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #000; color: var(--text); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent2); background: rgba(138,155,168,.1); box-shadow: 2px 2px 0 #000; }

  .searchbar-wrap {
    padding: 8px 32px;
    background: var(--surface);
    border-bottom: 2px solid #000;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    position: sticky;
    top: 84px;
    z-index: 170;
  }

  #searchInput {
    background: var(--surface2);
    border: 2px solid #000;
    color: var(--text);
    padding: 5px 12px;
    font-family: 'PressStart2P', monospace;
    font-size: .5rem;
    width: 220px;
    outline: none;
    transition: border-color .1s;
    box-shadow: inset 2px 2px 0 rgba(0,0,0,.5);
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text-dim); }

  .select-styled {
    background: var(--surface2);
    border: 2px solid #000;
    color: var(--text-dim);
    padding: 5px 8px;
    font-family: 'PressStart2P', monospace;
    font-size: .45rem;
    letter-spacing: .03em;
    cursor: pointer;
    outline: none;
    text-transform: uppercase;
    box-shadow: 2px 2px 0 #000;
  }
  .select-styled:focus { border-color: var(--accent); color: var(--accent2); }

  .btn-action {
    background: rgba(138,155,168,.12);
    border: 2px solid var(--accent);
    color: var(--accent2);
    padding: 5px 12px;
    font-family: 'PressStart2P', monospace;
    font-size: .45rem;
    letter-spacing: .05em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .1s;
    box-shadow: 2px 2px 0 #000;
  }
  .btn-action:hover { background: rgba(138,155,168,.22); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #000; }

  /* ── MAIN ── */
  main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  .categoria { margin-bottom: 40px; animation: fadeIn .3s ease both; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .categoria-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 2px solid #000;
  }
  .categoria-header h2 {
    font-family: 'PressStart2P', monospace;
    font-size: .6rem;
    letter-spacing: .12em;
    color: var(--accent2);
    text-transform: uppercase;
    text-shadow: 1px 1px 0 #000;
  }
  .count {
    font-family: 'PressStart2P', monospace;
    font-size: .4rem;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 8px;
    border: 1px solid #000;
    box-shadow: 1px 1px 0 #000;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 8px; }

  /* ── CARD ── */
  .arma {
    background: var(--surface);
    border: 2px solid #000;
    padding: 12px 14px;
    transition: transform .1s, box-shadow .1s;
    position: relative; overflow: hidden;
    cursor: pointer; user-select: none;
    box-shadow: 3px 3px 0 #000;
    background-image: var(--tex1);
    background-size: 200px;
    background-blend-mode: overlay;
  }
  .arma::before {
    content:''; position:absolute; top:0; left:0;
    width:4px; height:100%;
    background: var(--tier-color, var(--border2));
    box-shadow: 1px 0 0 #000;
  }
  .arma:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 #000; }
  .arma.selected-compare {
    border-color: var(--accent) !important;
    box-shadow: 3px 3px 0 var(--accent);
  }

  .arma-nombre {
    font-family: 'PressStart2P', monospace;
    font-size: .65rem;
    color: var(--text-bright);
    margin-bottom: 8px;
    padding-left: 10px;
    text-shadow: 1px 1px 0 #000;
  }
  .badges { display:flex; gap:4px; margin-bottom:8px; flex-wrap:wrap; padding-left:10px; }
  .badge {
    font-size: .38rem;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 2px 6px;
    text-transform: uppercase;
    font-family: 'PressStart2P', monospace;
    border: 1px solid #000;
    box-shadow: 1px 1px 0 #000;
  }
  .badge-tier1{background:rgba(90,138,170,.2);color:var(--tier1);}
  .badge-tier2{background:rgba(106,154,106,.2);color:var(--tier2);}
  .badge-tier3{background:rgba(154,138,90,.2);color:var(--tier3);}
  .badge-tier4{background:rgba(138,106,154,.2);color:var(--tier4);}
  .badge-comun{background:rgba(119,136,136,.15);color:var(--comun);}
  .badge-poco_comun{background:rgba(106,154,106,.15);color:var(--poco_comun);}
  .badge-inusual{background:rgba(90,138,170,.15);color:var(--inusual);}
  .badge-rara{background:rgba(138,106,154,.15);color:var(--rara);}
  .badge-muy_rara{background:rgba(154,112,96,.15);color:var(--muy_rara);}
  .badge-na{background:rgba(60,60,60,.3);color:#556;}
  .badge-tba{background:rgba(60,60,60,.3);color:#667;}

  .stats { display:grid; grid-template-columns:1fr 1fr; gap:3px 10px; padding-left:10px; }
  .stat { display:flex; justify-content:space-between; font-size:.4rem; padding:3px 0; border-bottom:1px solid rgba(0,0,0,.4); }
  .stat-label { color:var(--text-dim); font-size:.38rem; text-transform:uppercase; letter-spacing:.04em; }
  .stat-value { font-family:'PressStart2P',monospace; color:var(--text); font-size:.45rem; }
  .stat-value.hi { color:var(--accent2); text-shadow:0 0 8px rgba(176,196,208,.4); }
  .stat-recoil { grid-column:1/-1; }

  .recoil-bar-wrap { display:flex; gap:6px; align-items:center; margin-top:2px; }
  .recoil-label { font-size:.38rem; color:var(--text-dim); width:10px; }
  .recoil-bar-bg { flex:1; height:4px; background:#000; border:1px solid #000; overflow:hidden; }
  .recoil-bar-fill { height:100%; background:linear-gradient(90deg,var(--metal-dark),var(--metal-light)); }

  /* ── RANKINGS ── */
  #rankingPanel { display:none; padding:24px 32px; max-width:900px; margin:0 auto; animation:fadeIn .3s ease both; }
  .rank-checks { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
  .rank-check-label {
    display:flex; align-items:center; gap:6px; cursor:pointer;
    background:var(--surface); border:2px solid #000;
    padding:5px 10px; font-family:'PressStart2P',monospace;
    font-size:.4rem; letter-spacing:.04em; text-transform:uppercase;
    color:var(--text-dim); transition:all .1s; box-shadow:2px 2px 0 #000;
    user-select:none;
  }
  .rank-check-label:hover { transform:translate(-1px,-1px); box-shadow:3px 3px 0 #000; color:var(--text); }
  .rank-check-label.checked { border-color:var(--accent); color:var(--accent2); background:rgba(138,155,168,.1); }
  .rank-check-dot {
    width:6px; height:6px; border:2px solid #000;
    background:var(--surface2); flex-shrink:0; box-shadow:1px 1px 0 #000;
  }
  .rank-check-label.checked .rank-check-dot { background:var(--accent2); box-shadow:0 0 4px rgba(176,196,208,.5); }

  .rank-active-desc { font-family:'PressStart2P',monospace; font-size:.38rem; color:var(--text-dim); line-height:1.8; margin-bottom:16px; padding:10px 12px; background:var(--surface); border:2px solid #000; box-shadow:2px 2px 0 #000; }
  .ranking-title { font-family:'PressStart2P',monospace; font-size:.6rem; color:var(--accent2); letter-spacing:.1em; text-transform:uppercase; margin-bottom:12px; text-shadow:1px 1px 0 #000; }
  .rank-rows { display:flex; flex-direction:column; gap:6px; }
  .rank-row, .ranking-row {
    display:flex; align-items:center; gap:10px;
    background:var(--surface); border:2px solid #000;
    padding:10px 14px; box-shadow:3px 3px 0 #000;
    border-left:4px solid var(--tier-color,#333);
    background-image:var(--tex1); background-size:180px; background-blend-mode:overlay;
    transition:transform .1s,box-shadow .1s;
  }
  .rank-row:hover, .ranking-row:hover { transform:translate(-2px,-2px); box-shadow:5px 5px 0 #000; }
  .rank-pos, .ranking-pos { font-family:'PressStart2P',monospace; font-size:.5rem; color:var(--text-dim); width:28px; text-align:right; flex-shrink:0; }
  .rank-pos.gold, .ranking-pos.gold { color:#b8a848; text-shadow:0 0 8px rgba(184,168,72,.5); }
  .rank-pos.silver, .ranking-pos.silver { color:#8898a8; }
  .rank-pos.bronze, .ranking-pos.bronze { color:#9a7858; }
  .rank-nombre, .ranking-nombre { font-family:'PressStart2P',monospace; font-size:.5rem; color:var(--text-bright); flex:1; text-shadow:1px 1px 0 #000; }
  .ranking-cat { font-family:'PressStart2P',monospace; font-size:.35rem; color:var(--text-dim); flex-shrink:0; width:90px; text-align:right; }
  .rank-bar-wrap, .ranking-bar-bg { flex:2; height:6px; background:#000; border:1px solid #000; overflow:hidden; box-shadow:inset 1px 1px 0 rgba(0,0,0,.5); }
  .rank-bar, .ranking-bar-fill { height:100%; background:linear-gradient(90deg,var(--metal-dark),var(--metal-light)); }
  .rank-score, .ranking-score { font-family:'PressStart2P',monospace; font-size:.42rem; color:var(--accent); width:80px; text-align:right; flex-shrink:0; }
  .rank-no-sel { padding:40px; text-align:center; font-family:'PressStart2P',monospace; font-size:.5rem; color:var(--text-dim); letter-spacing:.08em; }

  /* ── COMPARADOR ── */
  #comparadorPanel { display:none; padding:24px 32px; animation:fadeIn .3s ease both; }
  .comp-title { font-family:'PressStart2P',monospace; font-size:.6rem; color:var(--accent2); letter-spacing:.1em; margin-bottom:16px; text-shadow:1px 1px 0 #000; }
  .comp-hint { font-size:.4rem; color:var(--text-dim); }
  .comp-mode-tabs { display:flex; gap:6px; margin-bottom:16px; }
  .comp-mode-tab {
    background:var(--surface2); border:2px solid #000;
    color:var(--text-dim); padding:6px 14px;
    font-family:'PressStart2P',monospace; font-size:.45rem;
    letter-spacing:.06em; text-transform:uppercase;
    cursor:pointer; transition:all .1s; box-shadow:2px 2px 0 #000;
  }
  .comp-mode-tab:hover { transform:translate(-1px,-1px); box-shadow:3px 3px 0 #000; }
  .comp-mode-tab.active { border-color:var(--accent); color:var(--accent2); background:rgba(138,155,168,.1); }
  .comp-grid { display:grid; grid-template-columns:1fr 40px 1fr; gap:10px; }
  .comp-col {
    background:var(--surface); border:2px solid #000;
    padding:14px; box-shadow:3px 3px 0 #000;
    border-left:4px solid var(--tier-color,#000);
    background-image:var(--tex1); background-size:180px; background-blend-mode:overlay;
  }
  .comp-col-nombre { font-family:'PressStart2P',monospace; font-size:.6rem; color:var(--text-bright); margin-bottom:10px; text-shadow:1px 1px 0 #000; }
  .comp-placeholder { font-family:'PressStart2P',monospace; font-size:.45rem; color:var(--text-dim); padding:40px; text-align:center; border:2px dashed #000; }
  .comp-mid { display:flex; align-items:center; justify-content:center; }
  .comp-vs { font-family:'PressStart2P',monospace; font-size:.7rem; color:var(--text-dim); text-shadow:1px 1px 0 #000; }
  .comp-stat-row { display:flex; justify-content:space-between; font-size:.4rem; padding:4px 0; border-bottom:1px solid rgba(0,0,0,.5); }
  .comp-stat-label { color:var(--text-dim); font-size:.38rem; text-transform:uppercase; }
  .comp-stat-val { font-family:'PressStart2P',monospace; font-size:.4rem; color:var(--text); }
  .comp-stat-val.win { color:var(--win); text-shadow:0 0 6px rgba(106,154,106,.4); }
  .comp-stat-val.lose { color:var(--lose); }

  /* ── SIMULACIÓN ── */
  .sim-wrap { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .sim-side {
    background:var(--surface); border:2px solid #000;
    padding:14px; border-left:4px solid var(--tier-color,#000);
    box-shadow:3px 3px 0 #000;
    background-image:var(--tex2); background-size:250px; background-blend-mode:overlay;
  }
  .sim-name { font-family:'PressStart2P',monospace; font-size:.55rem; color:var(--text-bright); margin-bottom:10px; text-shadow:1px 1px 0 #000; }
  .sim-hp-bar-bg { width:100%; height:8px; background:#000; border:1px solid #000; overflow:hidden; margin-bottom:6px; box-shadow:inset 1px 1px 0 rgba(0,0,0,.8); }
  .sim-hp-bar { height:100%; transition:width .4s ease,background .3s; }
  .sim-hp-text { font-family:'PressStart2P',monospace; font-size:.45rem; color:var(--text-dim); margin-bottom:12px; }
  .sim-stat-mini { display:flex; justify-content:space-between; font-size:.38rem; padding:3px 0; border-bottom:1px solid rgba(0,0,0,.5); }
  .sim-stat-lbl { color:var(--text-dim); font-size:.38rem; text-transform:uppercase; }
  .sim-stat-val { font-family:'PressStart2P',monospace; color:var(--text); font-size:.4rem; }
  .sim-log {
    grid-column:1/-1; background:var(--surface); border:2px solid #000;
    padding:12px; max-height:200px; overflow-y:auto;
    font-family:'PressStart2P',monospace; font-size:.38rem; color:var(--text-dim);
    box-shadow:inset 2px 2px 0 #000;
  }
  .sim-log-line { padding:2px 0; border-bottom:1px solid rgba(0,0,0,.3); line-height:1.6; }
  .sim-log-line.hit-a { color:#6a9ab0; }
  .sim-log-line.hit-b { color:#9a9060; }
  .sim-log-line.miss { color:#444; font-style:italic; }
  .sim-result {
    grid-column:1/-1; text-align:center; padding:14px;
    font-family:'PressStart2P',monospace; font-size:.6rem; letter-spacing:.08em;
    border:2px solid #000; background:var(--surface); box-shadow:3px 3px 0 #000;
  }
  .sim-result.win-a { border-color:#6a9ab0; color:#6a9ab0; text-shadow:0 0 10px rgba(106,154,176,.4); }
  .sim-result.win-b { border-color:#9a9060; color:#9a9060; text-shadow:0 0 10px rgba(154,144,96,.4); }
  .sim-result.draw { border-color:var(--text-dim); color:var(--text-dim); }
  .sim-btn {
    background:rgba(138,155,168,.1); border:2px solid #000;
    color:var(--accent); padding:6px 16px;
    font-family:'PressStart2P',monospace; font-size:.45rem;
    letter-spacing:.06em; cursor:pointer; text-transform:uppercase;
    transition:all .1s; box-shadow:2px 2px 0 #000;
  }
  .sim-btn:hover { transform:translate(-1px,-1px); box-shadow:3px 3px 0 #000; }
  .sim-note { grid-column:1/-1; text-align:center; font-size:.38rem; color:var(--text-dim); font-family:'PressStart2P',monospace; line-height:1.8; }
  .sim-controls { grid-column:1/-1; display:flex; gap:8px; justify-content:center; margin-bottom:4px; }

  .no-results { text-align:center; padding:60px; color:var(--text-dim); font-family:'PressStart2P',monospace; font-size:.5rem; letter-spacing:.08em; }

  /* ── INICIO ── */
  #inicioPanel { display:none; padding:24px 32px; max-width:900px; margin:0 auto; animation:fadeIn .3s ease both; }
  .inicio-disclaimer {
    background:var(--surface); border:2px solid #000;
    border-left:4px solid var(--accent);
    padding:12px 16px; margin-bottom:24px;
    font-family:'PressStart2P',monospace; font-size:.42rem; color:var(--text-dim); line-height:2;
    box-shadow:3px 3px 0 #000;
    background-image:var(--tex2); background-size:300px; background-blend-mode:overlay;
  }
  .inicio-disclaimer strong { color:var(--accent2); font-family:'PressStart2P',monospace; font-size:.45rem; letter-spacing:.06em; display:block; margin-bottom:6px; text-shadow:1px 1px 0 #000; }
  .inicio-disclaimer strong.inline { display:inline; font-size:inherit; }
  .inicio-section { margin-bottom:28px; }
  .inicio-section-title {
    font-family:'PressStart2P',monospace; font-size:.5rem;
    color:var(--accent2); letter-spacing:.1em; text-transform:uppercase;
    margin-bottom:12px; padding-bottom:8px;
    border-bottom:2px solid #000;
    text-shadow:1px 1px 0 #000;
  }
  .inicio-intro { font-family:'PressStart2P',monospace; font-size:.42rem; color:var(--text-dim); line-height:2; margin-bottom:16px; }
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:8px; }
  .stat-card {
    background:var(--surface); border:2px solid #000;
    padding:12px 14px; border-left:4px solid var(--accent);
    box-shadow:3px 3px 0 #000;
    background-image:var(--tex1); background-size:180px; background-blend-mode:overlay;
  }
  .stat-card-nombre { font-family:'PressStart2P',monospace; font-size:.5rem; color:var(--text-bright); margin-bottom:6px; text-shadow:1px 1px 0 #000; }
  .stat-card-desc { font-family:'PressStart2P',monospace; font-size:.38rem; color:var(--text-dim); line-height:2; }
  .stat-card-nota { font-family:'PressStart2P',monospace; font-size:.35rem; color:var(--text-dim); margin-top:6px; opacity:.7; }
  .stat-card.accent2 { border-left-color:var(--tier2); }
  .stat-card.accent3 { border-left-color:var(--tier3); }
  .stat-card.accent4 { border-left-color:var(--tier4); }
  .features-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:6px; }
  .feature-item {
    background:var(--surface); border:2px solid #000;
    padding:10px 12px; display:flex; gap:8px; align-items:flex-start;
    box-shadow:2px 2px 0 #000;
    background-image:var(--tex2); background-size:250px; background-blend-mode:overlay;
  }
  .feature-icon { font-family:'PressStart2P',monospace; font-size:.5rem; color:var(--accent); flex-shrink:0; margin-top:2px; }
  .feature-text { font-family:'PressStart2P',monospace; font-size:.38rem; color:var(--text-dim); line-height:2; }
  .feature-text strong { color:var(--text); display:block; margin-bottom:2px; font-size:.42rem; }
  .tier-legend { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .tier-pill {
    font-family:'PressStart2P',monospace; font-size:.4rem;
    padding:4px 10px; border:2px solid #000;
    letter-spacing:.04em; box-shadow:2px 2px 0 #000;
  }

  footer {
    text-align:center; padding:12px 24px;
    color:var(--text-dim); font-family:'PressStart2P',monospace;
    font-size:.4rem; border-top:2px solid #000;
    letter-spacing:.08em;
    background:var(--surface);
    box-shadow:0 -2px 0 #000;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 195;
  }
  /* espacio para que el footer fijo no tape contenido */
  body { padding-bottom: 48px; }

  /* scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:#000; }
  ::-webkit-scrollbar-thumb { background:var(--metal-dark); border:1px solid #000; }
  ::-webkit-scrollbar-thumb:hover { background:var(--metal-light); }

  /* ── TORNEO ── */
  .torneo-wrap { display:flex; flex-direction:column; gap:14px; }
  .torneo-config {
    background:var(--surface); border:2px solid #000; padding:14px 16px;
    box-shadow:3px 3px 0 #000; display:flex; flex-direction:column; gap:10px;
  }
  .torneo-config-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .torneo-config-label { font-family:'PressStart2P',monospace; font-size:.42rem; color:var(--text-dim); white-space:nowrap; }
  .torneo-arma-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:6px; max-height:240px; overflow-y:auto; background:var(--surface2); border:2px solid #000; padding:8px; box-shadow:inset 2px 2px 0 #000; }
  .torneo-arma-btn {
    font-family:'PressStart2P',monospace; font-size:.38rem; padding:5px 8px;
    background:var(--surface); border:2px solid #000; color:var(--text-dim);
    cursor:pointer; text-align:left; transition:all .1s; box-shadow:1px 1px 0 #000;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .torneo-arma-btn:hover { transform:translate(-1px,-1px); box-shadow:2px 2px 0 #000; color:var(--text); }
  .torneo-arma-btn.sel { border-color:var(--accent); color:var(--accent2); background:rgba(138,155,168,.1); }
  .torneo-resultados {
    background:var(--surface); border:2px solid #000; padding:14px 16px;
    box-shadow:3px 3px 0 #000;
  }
  .torneo-result-title { font-family:'PressStart2P',monospace; font-size:.5rem; color:var(--accent2); margin-bottom:12px; text-shadow:1px 1px 0 #000; }
  .torneo-result-row {
    display:flex; align-items:center; gap:10px; padding:8px 10px;
    border:2px solid #000; margin-bottom:6px; box-shadow:2px 2px 0 #000;
    background:var(--surface2);
    border-left:4px solid var(--tier-color,#333);
  }

// ── CALCULOS ──
function efectivoDPS(a){
  // escopetas: 1 pellet = referencia (no multiplicar todos, asume ~40% impacto en combate)
  const dmg = (a.balas_por_disparo && a.balas_por_disparo!=='TBA')
    ? a.dano_cuerpo * a.balas_por_disparo * 0.4
    : a.dano_cuerpo;
  return dmg*(a.cadencia/60);
}
function rawDPS(a){
  const dmg=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')?a.dano_cuerpo*a.balas_por_disparo:a.dano_cuerpo;
  return dmg*(a.cadencia/60);
}
function calcTTK(a,hp){
  hp=hp||HP;
  const dmg=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')?a.dano_cuerpo*a.balas_por_disparo:a.dano_cuerpo;
  if(!dmg||dmg<=0) return null;
  return (Math.ceil(hp/dmg)-1)*(60000/a.cadencia);
}
// DPS sostenido: incluye recarga estimada (asumimos 2.5s recarga fija — no hay dato en JSON)
function calcDPSSostenido(a){
  const RELOAD_S=2.5;
  const dmgPorCargador=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')
    ?a.dano_cuerpo*a.balas_por_disparo*0.4*a.cargador
    :a.dano_cuerpo*a.cargador;
  const tiempoCargador=(a.cargador/(a.cadencia/60));
  const ciclo=tiempoCargador+RELOAD_S;
  return dmgPorCargador/ciclo;
}
// score largo alcance: difusión baja pesa mucho, daño decente, penalizar difusión alta
function scoreLejos(a){
  if(a.difusion>2.5) return -9999; // armas muy imprecisas directamente excluidas
  const difScore=1/(a.difusion+0.1);
  return difScore*14 + a.dano_cuerpo*0.6;
}
// score cercano: escopetas con pellets, o armas con difusión alta + cadencia alta
function scoreCercano(a){
  const pellets=a.balas_por_disparo&&a.balas_por_disparo!=='TBA'?a.balas_por_disparo:1;
  const dmgBurst=a.dano_cuerpo*pellets;
  const cadFactor=a.cadencia/60;
  // escopetas: el burst instantáneo importa más que la cadencia
  if(pellets>1) return dmgBurst*1.5 + cadFactor*2;
  // resto: cadencia + daño + difusion (no importa tanto en cercano)
  return dmgBurst*1.0 + cadFactor*3;
}
// score batalla larga humano vs humano: DPS sostenido + reserva decente
function scoreLargo(a){
  return calcDPSSostenido(a)*2 + a.reserva_maxima*0.4;
}
// score vs SPCs: daño por bala pesa mucho (SCPs tienen mucha vida), reserva también
function scoreVsSPC(a){
  const dmgPorBala=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')
    ?a.dano_cuerpo*a.balas_por_disparo*0.4
    :a.dano_cuerpo;
  // penalizar armas con poca reserva — te quedas sin balas contra un SCP
  if(a.reserva_maxima<20) return -9999;
  return dmgPorBala*4 + a.reserva_maxima*0.5 + (a.cadencia/60)*0.5;
}
// score casual: tier I-II, rareza accesible, stats decentes
function scoreCasual(a){
  if(a.tier>2) return -9999;
  if(!['comun','poco_comun','inusual'].includes(a.rareza)) return -9999;
  return efectivoDPS(a)*0.6 + a.dano_cuerpo*0.4;
}
function fmtTTK(ms){if(ms===null)return'N/A';if(ms===0)return'0 ms';return ms<1000?`${Math.round(ms)} ms`:`${(ms/1000).toFixed(2)} s`;}

function allArmas(){const l=[];for(const c in ARMAS)ARMAS[c].forEach(a=>l.push({...a,_cat:c}));return l;}
function findArma(cat,nombre){return(ARMAS[cat]||[]).find(a=>a.nombre===nombre);}

// ── ARSENAL ──
function renderArsenalView(){
  const cont=document.getElementById('contenedor');
  cont.innerHTML='';
  const q=searchQuery.toLowerCase();
  for(const cat in ARMAS){
    if(currentCat!=='all'&&cat!==currentCat)continue;
    let armas=ARMAS[cat].filter(a=>{
      return(!q||a.nombre.toLowerCase().includes(q))&&
             (currentRareza==='all'||a.rareza===currentRareza)&&
             (currentTier==='all'||String(a.tier)===currentTier);
    });
    if(!armas.length)continue;
    if(currentSort!=='default'){
      armas=[...armas].sort((a,b)=>{
        if(currentSort==='dps_desc')return efectivoDPS(b)-efectivoDPS(a);
        if(currentSort==='dps_asc')return efectivoDPS(a)-efectivoDPS(b);
        if(currentSort==='ttk_asc')return(calcTTK(a)??999999)-(calcTTK(b)??999999);
        if(currentSort==='dano_desc')return b.dano_cuerpo-a.dano_cuerpo;
        if(currentSort==='cadencia_desc')return b.cadencia-a.cadencia;
        return 0;
      });
    }
    const div=document.createElement('div');div.className='categoria';
    div.innerHTML=`<div class="categoria-header"><h2>${CAT_LABELS(cat)}</h2><span class="count">${armas.length} ${lang==='en'?'weapons':'armas'}</span></div><div class="grid">${armas.map(a=>renderArma(a,cat)).join('')}</div>`;
    cont.appendChild(div);
  }
  if(!cont.children.length)cont.innerHTML=`<div class="no-results">// ${lang==='en'?'NO WEAPONS FOUND':'NO SE ENCONTRARON ARMAS'}</div>`;
}

// ── DISPONIBILIDAD ──
// rareza: comun=6, poco_comun=5, inusual=4, rara=3, muy_rara=2, N/A=1, TBA=1
// tier: I=4, II=3, III=2, IV=1 — combinado y normalizado a 0-100
const RAREZA_SCORE={comun:6,poco_comun:5,inusual:4,rara:3,muy_rara:2,'N/A':1,TBA:1};
function scoreDisponibilidad(a){
  const r=RAREZA_SCORE[a.rareza]||1; // 1-6
  const t=5-a.tier; // tier I=4, IV=1
  return (r/6)*70 + (t/4)*30;
}

// penalización para armas sin rareza definida
const RAREZA_PENALIZADA=new Set(['N/A','TBA']);
function penalizacion(a){return RAREZA_PENALIZADA.has(a.rareza)?0.7:1.0;}

// score balanceado: DPS sostenido + tier como multiplicador + penalización N/A/TBA
function scoreBalanceado(a){
  const dps=calcDPSSostenido(a);
  const tierMult={1:0.7,2:0.85,3:1.0,4:1.2}[a.tier]||1.0;
  return dps * tierMult * penalizacion(a);
}

// normaliza scores de 0-1 para cada modo
function normalizeScores(list,scoreFn){
  const scores=list.map(a=>scoreFn(a));
  const max=Math.max(...scores)||1;
  const min=Math.min(...scores);
  return list.map((a,i)=>({a,norm:max===min?1:(scores[i]-min)/(max-min)}));
}

    return`<button class="rank-check-label${on?' checked':''}" onclick="toggleRankMode('${k}')">

  }).join('');

  // toggle N/A y TBA
  const toggleNA=`<button class="rank-check-label${rankShowNA?' checked':''}" onclick="rankShowNA=!rankShowNA;renderRanking()">
    <span class="rank-check-dot"></span>${lang==='es'?'Incluir N/A y TBA':'Include N/A & TBA'}
  </button>`;

  if(!activeRankModes.size){
    panel.innerHTML=`<div class="rank-checks">${checks}<div style="width:1px;height:22px;background:var(--border);margin:0 4px;align-self:center"></div>${toggleNA}</div><div class="rank-no-sel">// ${lang==='es'?'Selecciona al menos un modo':'Select at least one mode'}</div>`;
    return;
  }

  const desc=[...activeRankModes].map(k=>RANK_MODES[k].desc()).join(' · ');
  const activeModes=[...activeRankModes];

  // candidatos: filtrar N/A y TBA si el toggle está off
  let candidates=allArmas();
  if(!rankShowNA) candidates=candidates.filter(a=>!RAREZA_PENALIZADA.has(a.rareza));
  if(activeRankModes.has('casual')) candidates=candidates.filter(a=>a.tier<=2&&['comun','poco_comun','inusual'].includes(a.rareza));
  if(activeRankModes.has('spc')) candidates=candidates.filter(a=>a.reserva_maxima>=20);

  const perMode=activeModes.map(k=>{
    const fn=RANK_MODES[k].scoreFn;
    const vals=candidates.map(a=>Math.max(0,fn(a)));
    const max=Math.max(...vals)||1, min=Math.min(...vals);
    return candidates.map((_,i)=>max===min?1:(vals[i]-min)/(max-min));
  });

  const combined=candidates.map((a,ci)=>{
    const s=activeModes.reduce((acc,_,mi)=>acc+perMode[mi][ci],0)/activeModes.length;
    return{...a,_score:s};
  }).sort((a,b)=>b._score-a._score);

  const maxScore=combined[0]?._score||1;

  const rows=combined.map((a,i)=>{
    const tc=TIER_COLORS[a.tier]||'#555';
    const pc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const pct=(a._score/maxScore*100).toFixed(1);
    const scoreDisp=activeModes.length===1
      ?RANK_MODES[activeModes[0]].labelFn(a)
      :(a._score*100).toFixed(1)+' pts';
    const naTag=RAREZA_PENALIZADA.has(a.rareza)?`<span style="font-family:'Share Tech Mono',monospace;font-size:.62rem;color:#666;margin-left:4px">${a.rareza}</span>`:'';
    return`<div class="ranking-row" style="--tier-color:${tc}">
      <span class="ranking-pos ${pc}">#${i+1}</span>
      <span class="ranking-nombre">${a.nombre}${naTag}</span>
      <span class="ranking-cat">${CAT_LABELS(a._cat)}</span>
      <div class="ranking-bar-bg"><div class="ranking-bar-fill" style="width:${pct}%"></div></div>
      <span class="ranking-score">${scoreDisp}</span>
    </div>`;
  }).join('');

  const title=activeModes.length===1?RANK_MODES[activeModes[0]].label():(lang==='en'?`Combined Score (${activeModes.length} modes)`:`Score Combinado (${activeModes.length} modos)`);
  panel.innerHTML=`<div class="rank-checks">${checks}<div style="width:1px;height:22px;background:var(--border);margin:0 4px;align-self:center"></div>${toggleNA}</div><div class="rank-active-desc">${desc}</div><div class="ranking-title">// ${title}</div>${rows}`;
}

// ── SIMULACIÓN ──
// ── DISTANCIAS ──
// distMult: cuánto amplifica la difusión el chance de fallo
// recoilMult: cuánto pesa el recoil acumulado
const DIST_MODES={
  cerca: {label:()=>lang==='en'?'Close (CQB)':'Cerca (CQB)',  distMult:0.4, recoilMult:0.3, desc:()=>lang==='en'?'Spread barely matters, recoil almost irrelevant.':'Poca difusión importa, el recoil casi no pesa.'},
  medio: {label:()=>lang==='en'?'Medium':'Medio',              distMult:1.0, recoilMult:0.7, desc:()=>lang==='en'?'Balanced — spread and recoil both matter.':'Balance entre difusión y control del recoil.'},
  lejos: {label:()=>lang==='en'?'Long Range':'Lejos',          distMult:2.2, recoilMult:1.2, desc:()=>lang==='en'?'Spread heavily penalized, accumulated recoil hurts.':'Difusión penaliza fuerte, recoil acumulado duele.'},
};

// chance de fallar un disparo:
function calcMissChance(arma, recoilAcum, dist){
  const dm=DIST_MODES[dist];
  const difFactor = arma.difusion * dm.distMult * 0.06;  // difusion 1 a distancia media = 6%
  const recoilFactor = recoilAcum * dm.recoilMult * 0.018;
  return Math.min(0.65, difFactor + recoilFactor);
}

// recoil acumulado sube con cada disparo, decae con el tiempo entre disparos
function tickRecoil(recoilAcum, arma, msSinceLastShot){
  const kickY = arma.recoil.y;
  const kickX = arma.recoil.x;
  const kick = (kickY * 0.7 + kickX * 0.3);  // Y pesa más que X
  const decay = msSinceLastShot * 0.003;       // recuperación ~333ms para 1 punto
  return Math.max(0, recoilAcum - decay) + kick;
}

function simularCombate(a,b,hp,dist){
  hp=hp||HP;
  dist=dist||simDist;
  let hpA=hp,hpB=hp;
  let tickA=0,tickB=0;
  let lastShotA=0,lastShotB=0;
  let recoilAcumA=0,recoilAcumB=0;
  const msPerBalaA=60000/a.cadencia;
  const msPerBalaB=60000/b.cadencia;
  // daño base por disparo
  const dmgBaseA=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')?a.dano_cuerpo*a.balas_por_disparo*0.4:a.dano_cuerpo;
  const dmgBaseB=(b.balas_por_disparo&&b.balas_por_disparo!=='TBA')?b.dano_cuerpo*b.balas_por_disparo*0.4:b.dano_cuerpo;
  const log=[];
  let t=0;
  const maxT=30000;
  let hitsA=0,missA=0,hitsB=0,missB=0;
  while(hpA>0&&hpB>0&&t<maxT){
    const next=Math.min(tickA<=t?t:tickA,tickB<=t?t:tickB);
    t=Math.max(t,next);
    if(tickA<=t){
      recoilAcumA=tickRecoil(recoilAcumA,a,t-lastShotA);
      lastShotA=t;
      const miss=Math.random()<calcMissChance(a,recoilAcumA,dist);
      if(miss){missA++;log.push({t,who:'A',miss:true,hpA,hpB,recoil:recoilAcumA.toFixed(1)});}
      else{hitsA++;hpB=Math.max(0,hpB-dmgBaseA);log.push({t,who:'A',miss:false,dmg:dmgBaseA,hpA,hpB,recoil:recoilAcumA.toFixed(1)});}
      tickA=t+msPerBalaA;
      if(hpB<=0)break;
    }
    if(tickB<=t&&hpA>0&&hpB>0){
      recoilAcumB=tickRecoil(recoilAcumB,b,t-lastShotB);
      lastShotB=t;
      const miss=Math.random()<calcMissChance(b,recoilAcumB,dist);
      if(miss){missB++;log.push({t,who:'B',miss:true,hpA,hpB,recoil:recoilAcumB.toFixed(1)});}
      else{hitsB++;hpA=Math.max(0,hpA-dmgBaseB);log.push({t,who:'B',miss:false,dmg:dmgBaseB,hpA,hpB,recoil:recoilAcumB.toFixed(1)});}
      tickB=t+msPerBalaB;
      if(hpA<=0)break;
    }
  }
  const totalA=hitsA+missA,totalB=hitsB+missB;
  const accA=totalA?((hitsA/totalA)*100).toFixed(0):100;
  const accB=totalB?((hitsB/totalB)*100).toFixed(0):100;
  return{log,hpA:Math.max(0,hpA),hpB:Math.max(0,hpB),timeMs:t,accA,accB,hitsA,missA,hitsB,missB};
}

function simularN(a, b, n, hp, dist) {
  let winsA=0, winsB=0, draws=0, ttksA=[], ttksB=[];
  for(let i=0;i<n;i++){
    const r=simularCombate(a,b,hp,dist);
    if(r.hpA>0&&r.hpB<=0){winsA++;ttksA.push(r.timeMs);}
    else if(r.hpB>0&&r.hpA<=0){winsB++;ttksB.push(r.timeMs);}
    else draws++;
  }
  const avgTTK=arr=>arr.length?(arr.reduce((s,v)=>s+v,0)/arr.length/1000).toFixed(2)+'s':'—';
  return{winsA,winsB,draws,wrA:(winsA/n*100).toFixed(1),wrB:(winsB/n*100).toFixed(1),ttkA:avgTTK(ttksA),ttkB:avgTTK(ttksB)};
}

      <div class="torneo-config-row">
        <span class="torneo-config-label">${en?'Main weapon:':'Arma principal:'}</span>
        <span style="font-family:'PressStart2P',monospace;font-size:.42rem;color:var(--accent2)">${rivalSelLabel}</span>
      </div>
      <div style="font-family:'PressStart2P',monospace;font-size:.38rem;color:var(--text-dim);margin-bottom:4px">${en?'Click to pick main weapon:':'Click para elegir arma principal:'}</div>
      <div class="torneo-arma-grid">${rivalGrid}</div>
      <div style="font-family:'PressStart2P',monospace;font-size:.38rem;color:var(--text-dim);margin:8px 0 4px">${en?'Opponents (click to select, select all = fight everyone):':'Oponentes (click para seleccionar, todos = pelea contra todas):'}</div>
      <div class="torneo-config-row" style="gap:6px">
        <button class="btn-action" onclick="torneoSelectAll()">${en?'All':'Todas'}</button>
        <button class="filter-btn" onclick="torneoSelectCat('pistolas')">${en?'Pistols':'Pistolas'}</button>
        <button class="filter-btn" onclick="torneoSelectCat('submachine_guns')">SMGs</button>
        <button class="filter-btn" onclick="torneoSelectCat('escopetas')">${en?'Shotguns':'Escopetas'}</button>
        <button class="filter-btn" onclick="torneoSelectCat('fusiles_asalto')">${en?'Assault':'Asalto'}</button>
        <button class="filter-btn" onclick="torneoSelectCat('fusiles_combate')">${en?'Battle':'Combate'}</button>
        <button class="filter-btn" onclick="torneoSelectCat('armas_ligeras')">${en?'LMGs':'Ligeras'}</button>
        <button class="filter-btn" onclick="torneoClearRivales()">${en?'Clear':'Limpiar'}</button>
        <span style="font-family:'PressStart2P',monospace;font-size:.38rem;color:var(--text-dim)">${torneoRivales.size} ${en?'selected':'seleccionadas'}</span>
      </div>
      <div class="torneo-arma-grid">${opGrid}</div>
      <div class="torneo-config-row">
        <button class="btn-action" ${canRun?'':'disabled style="opacity:.4;cursor:not-allowed"'} onclick="torneoCorrer()">${en?'▶ Run Tournament':'▶ Correr Torneo'}</button>
        ${!canRun?`<span style="font-family:'PressStart2P',monospace;font-size:.38rem;color:var(--text-dim)">${en?'Pick main weapon + at least 1 opponent':'Elige arma principal + al menos 1 oponente'}</span>`:''}
      </div>
    </div>
    <div id="torneoResultados"></div>
  </div>`;
}

function torneoSetRival(cat,nombre){
  torneoRival=findArma(cat,nombre);
  // quitar al rival de los oponentes si estaba
  torneoRivales.delete(`${cat}::${nombre}`);
  renderTorneo();
}

function torneoToggleRival(cat,nombre){
  const key=`${cat}::${nombre}`;
  if(torneoRivales.has(key)) torneoRivales.delete(key);
  else torneoRivales.add(key);
  renderTorneo();
}

function torneoSelectAll(){
  torneoRivales.clear();
  allArmas().forEach(a=>{
    if(!torneoRival||a.nombre!==torneoRival.nombre)
      torneoRivales.add(`${a._cat}::${a.nombre}`);
  });
  renderTorneo();
}

function torneoSelectCat(cat){
  (ARMAS[cat]||[]).forEach(a=>{
    if(!torneoRival||a.nombre!==torneoRival.nombre)
      torneoRivales.add(`${cat}::${a.nombre}`);
  });
  renderTorneo();
}

function torneoClearRivales(){
  torneoRivales.clear();
  renderTorneo();
}

function torneoCorrer(){
  if(!torneoRival||!torneoRivales.size)return;
  const en=lang==='en';
  const resDiv=document.getElementById('torneoResultados');
  resDiv.innerHTML=`<div class="torneo-progreso">${en?'Running...':'Corriendo...'} (${torneoRondas} ${en?'rounds each':'rondas por pelea'})</div>`;

  // usar setTimeout para que el DOM actualice antes de bloquear con cálculos
  setTimeout(()=>{
    const resultados=[];
    for(const key of torneoRivales){
      const[cat,nombre]=key.split('::');
      const oponente=findArma(cat,nombre);
      if(!oponente)continue;
      const r=simularN(torneoRival,oponente,torneoRondas,torneoHP,torneoDist);
      resultados.push({arma:oponente,r,cat});
    }

    // ordenar por winrate del rival principal desc
    resultados.sort((a,b)=>parseFloat(b.r.wrA)-parseFloat(a.r.wrA));

    const maxWR=parseFloat(resultados[0]?.r.wrA||100);
    const rows=resultados.map((res,i)=>{
      const{arma,r}=res;
      const tc=TIER_COLORS[arma.tier]||'#333';
      const wr=parseFloat(r.wrA);
      const wrColor=wr>50?'#6a9a6a':wr===50?'var(--accent)':'#9a6a5a';
      const resultado=wr>50?(en?'WIN':'GANA'):wr<50?(en?'LOSE':'PIERDE'):'DRAW';
      const resColor=wr>50?'#6a9a6a':wr<50?'#9a6a5a':'var(--accent)';
      return`<div class="torneo-result-row${i===0&&wr>50?' winner':''}" style="--tier-color:${tc}">
        <span style="font-family:'PressStart2P',monospace;font-size:.42rem;color:var(--text-dim);width:22px;text-align:right;flex-shrink:0">${i+1}</span>
        <span class="torneo-result-nombre">${torneoRival.nombre} vs ${arma.nombre}</span>
        <span style="font-family:'PressStart2P',monospace;font-size:.38rem;color:var(--text-dim);flex-shrink:0">${en?'W':'V'}:${r.winsA} ${en?'L':'D'}:${r.winsB}</span>
        <span style="font-family:'PressStart2P',monospace;font-size:.38rem;color:var(--text-dim);width:60px;text-align:right;flex-shrink:0">TTK ${r.ttkA}</span>
        <span style="font-family:'PressStart2P',monospace;font-size:.42rem;color:${resColor};width:52px;text-align:right;flex-shrink:0">${resultado}</span>
      </div>`;
    }).join('');

    const totalPeleas=resultados.reduce((s,r)=>s+r.r.winsA+r.r.winsB+r.r.draws,0);
    const totalWins=resultados.reduce((s,r)=>s+r.r.winsA,0);
    const totalLoss=resultados.reduce((s,r)=>s+r.r.winsB,0);
    const globalWR=(totalWins/(totalWins+totalLoss)*100).toFixed(1);
    const avgTTKnum=resultados.filter(r=>r.r.ttkA!=='—');
    const avgTTK=avgTTKnum.length?(avgTTKnum.reduce((s,r)=>s+parseFloat(r.r.ttkA),0)/avgTTKnum.length).toFixed(2):'—';
    const globalColor=parseFloat(globalWR)>50?'#6a9a6a':'#9a6a5a';

    resDiv.innerHTML=`
    <div class="torneo-resultados">
      <div class="torneo-result-title">
        ${torneoRival.nombre} — ${en?'Global WR':'WR Global'}: <span style="color:${globalColor}">${globalWR}%</span>
        &nbsp;·&nbsp; ${en?'Wins':'Victorias'}: <span style="color:#6a9a6a">${totalWins}</span>
        &nbsp;·&nbsp; ${en?'Losses':'Derrotas'}: <span style="color:#9a6a5a">${totalLoss}</span>
        &nbsp;·&nbsp; TTK ${en?'avg':'prom'}: <span style="color:var(--accent)">${avgTTK}s</span>
      </div>
      ${rows}
    </div>`;
  },30);
}

// ── VIEWS ──
function setView(v){
  currentView=v;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  document.getElementById('contenedor').style.display=v==='armas'?'':'none';
  document.getElementById('inicioPanel').style.display=v==='inicio'?'block':'none';
  document.getElementById('rankingPanel').style.display=v==='ranking'?'block':'none';
  document.getElementById('comparadorPanel').style.display=v==='comparador'?'block':'none';
  document.getElementById('torneoPanel').style.display=v==='torneo'?'block':'none';
  document.getElementById('toolbar').style.display=v==='armas'?'':'none';
  document.getElementById('searchbarWrap').style.display=v==='armas'?'':'none';
  if(v==='inicio')    renderInicio();
  if(v==='ranking')   renderRanking();
  if(v==='comparador')renderComparador();
  if(v==='armas')     renderArsenalView();
  if(v==='torneo')    renderTorneo();
}

// ── BUILD TOOLBAR ──
const toolbar=document.getElementById('toolbar');
for(const cat in ARMAS){
  const btn=document.createElement('button');btn.className='filter-btn';btn.dataset.filter=cat;btn.textContent=CAT_LABELS(cat);toolbar.appendChild(btn);
}
toolbar.addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');if(!btn)return;
  toolbar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');currentCat=btn.dataset.filter;renderArsenalView();
});

document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderArsenalView();});
document.getElementById('rarezaFilter').addEventListener('change',e=>{currentRareza=e.target.value;renderArsenalView();});
document.getElementById('tierFilter').addEventListener('change',e=>{currentTier=e.target.value;renderArsenalView();});
document.getElementById('sortFilter').addEventListener('change',e=>{currentSort=e.target.value;renderArsenalView();});
document.getElementById('btnComparar').addEventListener('click',()=>setView('comparador'));
document.querySelectorAll('.view-tab').forEach(t=>t.addEventListener('click',()=>setView(t.dataset.view)));

setView('inicio');
</script>
</body>
</html>
