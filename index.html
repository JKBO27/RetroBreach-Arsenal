<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SPC RBreach // Arsenal</title>
<link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1278417590435188917/1480310706791383254/SCP_Foundation_emblem7.png?ex=69af3647&is=69ade4c7&hm=be2ebc068f332cbef21c04080fd8f917d25555e09c1f92a3568268ce8f10a1ac&">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a1a1a; --surface:#242424; --surface2:#2e2e2e; --border:#3a3a3a;
    --accent:#c8a84b; --accent2:#e8c86a; --text:#d4d4d4; --text-dim:#777;
    --tier1:#5ba3e0; --tier2:#78c97a; --tier3:#c8a84b; --tier4:#c97ad4;
    --comun:#aaa; --poco_comun:#78c97a; --inusual:#5ba3e0; --rara:#c97ad4; --muy_rara:#e0845b;
    --win:#78c97a; --lose:#e0845b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:999;}

  header{background:var(--surface);border-bottom:2px solid var(--accent);padding:18px 40px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200;}
  header h1{font-family:'Share Tech Mono',monospace;font-size:1.35rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;flex:1;}
  header p{font-family:'Rajdhani',sans-serif;font-size:.78rem;color:var(--text-dim);letter-spacing:.04em;}
  .header-left{display:flex;flex-direction:column;gap:3px;flex:1;}
  header span{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text-dim);border:1px solid var(--border);padding:3px 8px;border-radius:2px;align-self:center;}
  .header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .btn-discord{background:rgba(88,101,242,.15);border:1px solid rgba(88,101,242,.5);color:#8891f2;padding:6px 14px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.08em;cursor:pointer;text-decoration:none;transition:background .15s;white-space:nowrap;}
  .btn-discord:hover{background:rgba(88,101,242,.3);}
  .btn-lang{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.08em;cursor:pointer;transition:all .15s;}
  .btn-lang:hover,.btn-lang.active{border-color:var(--accent);color:var(--accent);background:rgba(200,168,75,.08);}

  .view-tabs{display:flex;padding:0 40px;background:var(--surface);border-bottom:1px solid var(--border);}
  .view-tab{font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;}
  .view-tab:hover{color:var(--text);}
  .view-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* ── ARSENAL BARS ── */
  .toolbar{padding:10px 40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .toolbar-sep{width:1px;height:22px;background:var(--border);margin:0 4px;}
  .filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:4px 12px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.05em;cursor:pointer;text-transform:uppercase;transition:all .15s;}
  .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,168,75,.07);}
  .searchbar-wrap{padding:10px 40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  #searchInput{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:.82rem;width:240px;outline:none;transition:border-color .15s;}
  #searchInput:focus{border-color:var(--accent);}
  #searchInput::placeholder{color:var(--text-dim);}
  .select-styled{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:6px 10px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.04em;cursor:pointer;outline:none;text-transform:uppercase;}
  .select-styled:focus{border-color:var(--accent);color:var(--accent);}
  .btn-action{background:rgba(200,168,75,.1);border:1px solid var(--accent);color:var(--accent);padding:5px 14px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.06em;cursor:pointer;text-transform:uppercase;transition:background .15s;}
  .btn-action:hover{background:rgba(200,168,75,.2);}

  /* ── MAIN ── */
  main{padding:28px 40px;max-width:1400px;margin:0 auto;}
  .categoria{margin-bottom:44px;animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .categoria-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .categoria-header h2{font-family:'Share Tech Mono',monospace;font-size:.85rem;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;}
  .count{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text-dim);background:var(--surface2);padding:2px 8px;border-radius:2px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}

  /* ── CARD ── */
  .arma{background:var(--surface);border:1px solid var(--border);padding:14px 16px;border-radius:3px;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative;overflow:hidden;cursor:pointer;user-select:none;}
  .arma::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--tier-color,var(--border));opacity:.85;}
  .arma:hover{border-color:#555;transform:translateY(-1px);}
  .arma.selected-compare{border-color:var(--accent)!important;box-shadow:0 0 0 1px var(--accent);}
  .arma-nombre{font-family:'Share Tech Mono',monospace;font-size:.98rem;color:#eee;margin-bottom:10px;padding-left:10px;}
  .badges{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;padding-left:10px;}
  .badge{font-size:.68rem;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:2px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
  .badge-tier1{background:rgba(91,163,224,.15);color:var(--tier1);border:1px solid rgba(91,163,224,.3);}
  .badge-tier2{background:rgba(120,201,122,.15);color:var(--tier2);border:1px solid rgba(120,201,122,.3);}
  .badge-tier3{background:rgba(200,168,75,.15);color:var(--tier3);border:1px solid rgba(200,168,75,.3);}
  .badge-tier4{background:rgba(201,122,212,.15);color:var(--tier4);border:1px solid rgba(201,122,212,.3);}
  .badge-comun{background:rgba(170,170,170,.1);color:var(--comun);border:1px solid rgba(170,170,170,.2);}
  .badge-poco_comun{background:rgba(120,201,122,.1);color:var(--poco_comun);border:1px solid rgba(120,201,122,.2);}
  .badge-inusual{background:rgba(91,163,224,.1);color:var(--inusual);border:1px solid rgba(91,163,224,.2);}
  .badge-rara{background:rgba(201,122,212,.1);color:var(--rara);border:1px solid rgba(201,122,212,.2);}
  .badge-muy_rara{background:rgba(224,132,91,.1);color:var(--muy_rara);border:1px solid rgba(224,132,91,.2);}
  .badge-na{background:rgba(80,80,80,.2);color:#666;border:1px solid #444;}
  .badge-tba{background:rgba(80,80,80,.2);color:#888;border:1px solid #555;}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;padding-left:10px;}
  .stat{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);}
  .stat-label{color:var(--text-dim);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;}
  .stat-value{font-family:'Share Tech Mono',monospace;color:#ccc;font-size:.82rem;}
  .stat-value.hi{color:var(--accent2);}
  .stat-recoil{grid-column:1/-1;}
  .recoil-bar-wrap{display:flex;gap:6px;align-items:center;margin-top:2px;}
  .recoil-label{font-size:.68rem;color:var(--text-dim);width:10px;}
  .recoil-bar-bg{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
  .recoil-bar-fill{height:100%;border-radius:2px;background:var(--accent);opacity:.7;}
  .recoil-val{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:#888;width:28px;text-align:right;}

  /* ── RANKING PANEL ── */
  #rankingPanel{display:none;padding:24px 40px;max-width:960px;margin:0 auto;animation:fadeIn .3s ease both;}
  .rank-checks{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .rank-check-label{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.05em;cursor:pointer;text-transform:uppercase;transition:all .15s;user-select:none;}
  .rank-check-label:hover{border-color:var(--accent);color:var(--accent);}
  .rank-check-label.checked{border-color:var(--accent);color:var(--accent);background:rgba(200,168,75,.1);}
  .rank-check-label input{display:none;}
  .rank-check-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .15s;flex-shrink:0;}
  .rank-check-label.checked .rank-check-dot{background:var(--accent);}
  .rank-active-desc{font-family:'Rajdhani',sans-serif;font-size:.82rem;color:var(--text-dim);margin-bottom:14px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:2px;line-height:1.5;}
  .ranking-title{font-family:'Share Tech Mono',monospace;font-size:.82rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .ranking-row{display:flex;align-items:center;gap:10px;padding:7px 12px;margin-bottom:5px;background:var(--surface);border:1px solid var(--border);border-radius:3px;border-left:3px solid var(--tier-color,#555);}
  .ranking-pos{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-dim);width:26px;text-align:right;flex-shrink:0;}
  .ranking-pos.gold{color:#ffd700;} .ranking-pos.silver{color:#c0c0c0;} .ranking-pos.bronze{color:#cd7f32;}
  .ranking-nombre{font-family:'Share Tech Mono',monospace;font-size:.88rem;color:#ddd;flex:1;}
  .ranking-cat{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
  .ranking-score{font-family:'Share Tech Mono',monospace;font-size:.88rem;color:var(--accent2);width:90px;text-align:right;flex-shrink:0;}
  .ranking-bar-bg{width:120px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;flex-shrink:0;}
  .ranking-bar-fill{height:100%;background:var(--accent);opacity:.75;border-radius:2px;}
  .rank-no-sel{text-align:center;padding:40px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.75rem;letter-spacing:.1em;}

  /* ── COMPARADOR ── */
  #comparadorPanel{display:none;padding:24px 40px;max-width:1000px;margin:0 auto;animation:fadeIn .3s ease both;}
  .comp-mode-tabs{display:flex;gap:0;margin-bottom:18px;}
  .comp-mode-tab{font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);padding:8px 18px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);transition:all .15s;}
  .comp-mode-tab:first-child{border-radius:2px 0 0 2px;}
  .comp-mode-tab:last-child{border-radius:0 2px 2px 0;border-left:none;}
  .comp-mode-tab.active{color:var(--accent);border-color:var(--accent);background:rgba(200,168,75,.08);}
  .comp-title{font-family:'Share Tech Mono',monospace;font-size:.82rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .comp-hint{font-size:.72rem;color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-weight:400;letter-spacing:.02em;text-transform:none;}
  .comp-grid{display:grid;grid-template-columns:1fr 50px 1fr;gap:0;}
  .comp-col{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:16px;border-left:3px solid var(--tier-color,#555);}
  .comp-col-nombre{font-family:'Share Tech Mono',monospace;font-size:.98rem;color:#eee;margin-bottom:8px;}
  .comp-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 4px;}
  .comp-vs{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-dim);}
  .comp-stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem;gap:6px;}
  .comp-stat-label{color:var(--text-dim);font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;}
  .comp-stat-val{font-family:'Share Tech Mono',monospace;color:#ccc;}
  .comp-stat-val.win{color:var(--win);} .comp-stat-val.lose{color:var(--lose);}
  .comp-placeholder{display:flex;align-items:center;justify-content:center;height:140px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:.1em;border:1px dashed var(--border);border-radius:3px;}

  /* ── SIMULACIÓN ── */
  .sim-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .sim-side{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:16px;border-left:3px solid var(--tier-color,#555);}
  .sim-name{font-family:'Share Tech Mono',monospace;font-size:.95rem;color:#eee;margin-bottom:12px;}
  .sim-hp-bar-bg{width:100%;height:10px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:6px;}
  .sim-hp-bar{height:100%;border-radius:3px;transition:width .4s ease,background .3s;}
  .sim-hp-text{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--text-dim);margin-bottom:14px;}
  .sim-stat-mini{display:flex;justify-content:space-between;font-size:.78rem;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);}
  .sim-stat-lbl{color:var(--text-dim);font-size:.7rem;text-transform:uppercase;}
  .sim-stat-val{font-family:'Share Tech Mono',monospace;color:#ccc;}
  .sim-log{grid-column:1/-1;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px;max-height:220px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-dim);}
  .sim-log-line{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);}
  .sim-log-line.hit-a{color:#88ccff;} .sim-log-line.hit-b{color:#ffcc66;} .sim-log-line.kill{color:var(--win);font-weight:bold;}
  .sim-result{grid-column:1/-1;text-align:center;padding:16px;font-family:'Share Tech Mono',monospace;font-size:1rem;letter-spacing:.1em;border:1px solid var(--border);border-radius:3px;background:var(--surface);}
  .sim-result.win-a{border-color:#88ccff;color:#88ccff;} .sim-result.win-b{border-color:#ffcc66;color:#ffcc66;} .sim-result.draw{border-color:var(--text-dim);color:var(--text-dim);}
  .sim-log-line.miss{color:#555;font-style:italic;}
  .sim-btn{background:rgba(200,168,75,.1);border:1px solid var(--accent);color:var(--accent);padding:7px 20px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:.75rem;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;transition:background .15s;}
  .sim-btn:hover{background:rgba(200,168,75,.2);}
  .sim-note{grid-column:1/-1;text-align:center;font-size:.72rem;color:var(--text-dim);font-family:'Share Tech Mono',monospace;}

  .no-results{text-align:center;padding:60px 20px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.8rem;letter-spacing:.1em;}

  /* ── INICIO ── */
  #inicioPanel{display:none;padding:30px 40px;max-width:900px;margin:0 auto;animation:fadeIn .35s ease both;}
  .inicio-disclaimer{background:rgba(200,168,75,.07);border:1px solid var(--accent);border-left:3px solid var(--accent);border-radius:3px;padding:14px 18px;margin-bottom:28px;font-family:'Rajdhani',sans-serif;font-size:.9rem;color:var(--text-dim);line-height:1.6;}
  .inicio-disclaimer strong{color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.8rem;letter-spacing:.1em;display:block;margin-bottom:6px;}
  .inicio-disclaimer strong.inline{display:inline;font-size:inherit;letter-spacing:inherit;}
  .inicio-section{margin-bottom:32px;}
  .inicio-section-title{font-family:'Share Tech Mono',monospace;font-size:.82rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .inicio-intro{font-family:'Rajdhani',sans-serif;font-size:.95rem;color:var(--text-dim);line-height:1.7;margin-bottom:20px;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px 16px;border-left:3px solid var(--accent);}
  .stat-card-nombre{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:#eee;margin-bottom:6px;}
  .stat-card-desc{font-family:'Rajdhani',sans-serif;font-size:.88rem;color:var(--text-dim);line-height:1.55;}
  .stat-card-nota{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--text-dim);margin-top:6px;opacity:.7;}
  .stat-card.accent2{border-left-color:var(--tier2);}
  .stat-card.accent3{border-left-color:var(--tier3);}
  .stat-card.accent4{border-left-color:var(--tier4);}
  .features-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
  .feature-item{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;}
  .feature-icon{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--accent);flex-shrink:0;margin-top:2px;}
  .feature-text{font-family:'Rajdhani',sans-serif;font-size:.88rem;color:var(--text-dim);line-height:1.5;}
  .feature-text strong{color:var(--text);display:block;margin-bottom:2px;}
  .tier-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .tier-pill{font-family:'Share Tech Mono',monospace;font-size:.72rem;padding:4px 12px;border-radius:2px;letter-spacing:.06em;}
  .header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .btn-lang{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.08em;padding:4px 10px;border-radius:2px;cursor:pointer;transition:all .15s;}
  .btn-lang:hover{border-color:var(--accent);color:var(--accent);}
  .btn-lang.active{border-color:var(--accent);color:var(--accent);background:rgba(200,168,75,.1);}
  .btn-discord{background:rgba(88,101,242,.15);border:1px solid rgba(88,101,242,.4);color:#8891f2;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.08em;padding:4px 12px;border-radius:2px;cursor:pointer;text-decoration:none;transition:all .15s;}
  .btn-discord:hover{background:rgba(88,101,242,.25);border-color:#8891f2;}
  footer{text-align:center;padding:28px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.7rem;border-top:1px solid var(--border);letter-spacing:.1em;margin-top:20px;}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>&#9632; SPC RBreach // Arsenal</h1>
    <p id="header-sub">Wiki de armas sobre el videojuego SPC Retro Breach Roblox</p>
  </div>
  <div class="header-actions">
    <button class="btn-lang active" id="btnES" onclick="setLang('es')">ES</button>
    <button class="btn-lang" id="btnEN" onclick="setLang('en')">EN</button>
    <a class="btn-discord" href="https://discord.gg/7kPBn5JUX5" target="_blank">&#9670; Discord</a>
    <span>v1.0</span>
  </div>
</header>

<div class="view-tabs">
  <button class="view-tab active" data-view="inicio">Inicio</button>
  <button class="view-tab" data-view="armas">Arsenal</button>
  <button class="view-tab" data-view="ranking">Rankings</button>
  <button class="view-tab" data-view="comparador">Comparador</button>
</div>

<!-- Arsenal bars -->
<div class="toolbar" id="toolbar" style="display:flex">
  <button class="filter-btn active" data-filter="all">Todas</button>
  <div class="toolbar-sep"></div>
</div>
<div class="searchbar-wrap" id="searchbarWrap">
  <input type="text" id="searchInput" placeholder="Buscar arma..." autocomplete="off">
  <select class="select-styled" id="rarezaFilter">

// ── CALCULOS ──
function efectivoDPS(a){
  // escopetas: 1 pellet = referencia (no multiplicar todos, asume ~40% impacto en combate)
  const dmg = (a.balas_por_disparo && a.balas_por_disparo!=='TBA')
    ? a.dano_cuerpo * a.balas_por_disparo * 0.4
    : a.dano_cuerpo;
  return dmg*(a.cadencia/60);
}
function rawDPS(a){
  const dmg=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')?a.dano_cuerpo*a.balas_por_disparo:a.dano_cuerpo;
  return dmg*(a.cadencia/60);
}
function calcTTK(a,hp){
  hp=hp||HP;
  const dmg=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')?a.dano_cuerpo*a.balas_por_disparo:a.dano_cuerpo;
  if(!dmg||dmg<=0) return null;
  return (Math.ceil(hp/dmg)-1)*(60000/a.cadencia);
}
// DPS sostenido: incluye recarga estimada (asumimos 2.5s recarga fija — no hay dato en JSON)
function calcDPSSostenido(a){
  const RELOAD_S=2.5;
  const dmgPorCargador=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')
    ?a.dano_cuerpo*a.balas_por_disparo*0.4*a.cargador
    :a.dano_cuerpo*a.cargador;
  const tiempoCargador=(a.cargador/(a.cadencia/60));
  const ciclo=tiempoCargador+RELOAD_S;
  return dmgPorCargador/ciclo;
}
// score largo alcance: difusión baja pesa mucho, daño decente, penalizar difusión alta
function scoreLejos(a){
  if(a.difusion>2.5) return -9999; // armas muy imprecisas directamente excluidas
  const difScore=1/(a.difusion+0.1);
  return difScore*14 + a.dano_cuerpo*0.6;
}
// score cercano: escopetas con pellets, o armas con difusión alta + cadencia alta
function scoreCercano(a){
  const pellets=a.balas_por_disparo&&a.balas_por_disparo!=='TBA'?a.balas_por_disparo:1;
  const dmgBurst=a.dano_cuerpo*pellets;
  const cadFactor=a.cadencia/60;
  // escopetas: el burst instantáneo importa más que la cadencia
  if(pellets>1) return dmgBurst*1.5 + cadFactor*2;
  // resto: cadencia + daño + difusion (no importa tanto en cercano)
  return dmgBurst*1.0 + cadFactor*3;
}
// score batalla larga humano vs humano: DPS sostenido + reserva decente
function scoreLargo(a){
  return calcDPSSostenido(a)*2 + a.reserva_maxima*0.4;
}
// score vs SPCs: daño por bala pesa mucho (SCPs tienen mucha vida), reserva también
function scoreVsSPC(a){
  const dmgPorBala=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')
    ?a.dano_cuerpo*a.balas_por_disparo*0.4
    :a.dano_cuerpo;
  // penalizar armas con poca reserva — te quedas sin balas contra un SCP
  if(a.reserva_maxima<20) return -9999;
  return dmgPorBala*4 + a.reserva_maxima*0.5 + (a.cadencia/60)*0.5;
}
// score casual: tier I-II, rareza accesible, stats decentes
function scoreCasual(a){
  if(a.tier>2) return -9999;
  if(!['comun','poco_comun','inusual'].includes(a.rareza)) return -9999;
  return efectivoDPS(a)*0.6 + a.dano_cuerpo*0.4;
}

function badgeRareza(r){const k=(r||'N/A').toLowerCase().replace(/ /g,'_');if(k==='n/a')return`<span class="badge badge-na">N/A</span>`;if(k==='tba')return`<span class="badge badge-tba">TBA</span>`;return`<span class="badge badge-${k}">${r.replace(/_/g,' ')}</span>`;}
function recoilBar(label,val){const pct=Math.min((val/MAX_RECOIL)*100,100).toFixed(1);return`<div class="recoil-bar-wrap"><span class="recoil-label">${label}</span><div class="recoil-bar-bg"><div class="recoil-bar-fill" style="width:${pct}%"></div></div><span class="recoil-val">${val}</span></div>`;}

// ── STATE ──
let currentView='armas',currentCat='all',currentRareza='all',currentTier='all',currentSort='default',searchQuery='';
let compareSlots=[];
let compMode='stats';
let simHP=100;
let simDist='medio';


function toggleCompare(cat,nombre){
  if(currentView!=='armas')return;
  const id=`${cat}::${nombre}`;
  const idx=compareSlots.indexOf(id);
  if(idx>=0)compareSlots.splice(idx,1);
  else{if(compareSlots.length>=2)compareSlots.shift();compareSlots.push(id);}
  document.getElementById('btnComparar').style.display=compareSlots.length===2?'':'none';
  renderArsenalView();
}

// ── CARD ──
function renderArma(arma,catKey){
  const tc=TIER_COLORS[arma.tier]||'#555';
  const dps=efectivoDPS(arma).toFixed(1);
  const ttk=fmtTTK(calcTTK(arma));
  const en=lang==='en';
  const balasStat=(arma.balas_por_disparo!=null)?`<div class="stat"><span class="stat-label">${en?'Pellets/shot':'Balas/disparo'}</span><span class="stat-value">${arma.balas_por_disparo}</span></div>`:'';
  const selCls=compareSlots.includes(`${catKey}::${arma.nombre}`)?'selected-compare':'';
  const safe=arma.nombre.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return`<div class="arma ${selCls}" style="--tier-color:${tc}" onclick="toggleCompare('${catKey}','${safe}')">
    <div class="arma-nombre">${arma.nombre}</div>
    <div class="badges">${badgeTier(arma.tier)}${badgeRareza(arma.rareza)}</div>
    <div class="stats">
      <div class="stat"><span class="stat-label">${en?'Head dmg':'Dmg cabeza'}</span><span class="stat-value">${arma.dano_cabeza}</span></div>
      <div class="stat"><span class="stat-label">${en?'Body dmg':'Dmg cuerpo'}</span><span class="stat-value">${arma.dano_cuerpo}</span></div>
      <div class="stat"><span class="stat-label">${en?'Fire Rate':'Cadencia'}</span><span class="stat-value">${arma.cadencia} rpm</span></div>
      <div class="stat"><span class="stat-label">${en?'Spread':'Difusión'}</span><span class="stat-value">${arma.difusion}</span></div>
      ${balasStat}
      <div class="stat"><span class="stat-label">DPS</span><span class="stat-value hi">${dps}</span></div>
      <div class="stat"><span class="stat-label">TTK (100hp)</span><span class="stat-value hi">${ttk}</span></div>
      <div class="stat"><span class="stat-label">${en?'Magazine':'Cargador'}</span><span class="stat-value">${arma.cargador}</span></div>
      <div class="stat"><span class="stat-label">${en?'Reserve':'Reserva'}</span><span class="stat-value">${arma.reserva_maxima}</span></div>
      <div class="stat stat-recoil"><div style="width:100%"><span class="stat-label">Recoil</span>${recoilBar('X',arma.recoil.x)}${recoilBar('Y',arma.recoil.y)}</div></div>
    </div>
  </div>`;
}

// ── ARSENAL ──
function renderArsenalView(){
  const cont=document.getElementById('contenedor');
  cont.innerHTML='';
  const q=searchQuery.toLowerCase();
  for(const cat in ARMAS){
    if(currentCat!=='all'&&cat!==currentCat)continue;
    let armas=ARMAS[cat].filter(a=>{
      return(!q||a.nombre.toLowerCase().includes(q))&&
             (currentRareza==='all'||a.rareza===currentRareza)&&
             (currentTier==='all'||String(a.tier)===currentTier);
    });
    if(!armas.length)continue;
    if(currentSort!=='default'){
      armas=[...armas].sort((a,b)=>{
        if(currentSort==='dps_desc')return efectivoDPS(b)-efectivoDPS(a);
        if(currentSort==='dps_asc')return efectivoDPS(a)-efectivoDPS(b);
        if(currentSort==='ttk_asc')return(calcTTK(a)??999999)-(calcTTK(b)??999999);
        if(currentSort==='dano_desc')return b.dano_cuerpo-a.dano_cuerpo;
        if(currentSort==='cadencia_desc')return b.cadencia-a.cadencia;
        return 0;
      });
    }
    const div=document.createElement('div');div.className='categoria';
    div.innerHTML=`<div class="categoria-header"><h2>${CAT_LABELS(cat)}</h2><span class="count">${armas.length} ${lang==='en'?'weapons':'armas'}</span></div><div class="grid">${armas.map(a=>renderArma(a,cat)).join('')}</div>`;
    cont.appendChild(div);
  }
  if(!cont.children.length)cont.innerHTML=`<div class="no-results">// ${lang==='en'?'NO WEAPONS FOUND':'NO SE ENCONTRARON ARMAS'}</div>`;
}

// ── DISPONIBILIDAD ──
// rareza: comun=6, poco_comun=5, inusual=4, rara=3, muy_rara=2, N/A=1, TBA=1
// tier: I=4, II=3, III=2, IV=1 — combinado y normalizado a 0-100
const RAREZA_SCORE={comun:6,poco_comun:5,inusual:4,rara:3,muy_rara:2,'N/A':1,TBA:1};
function scoreDisponibilidad(a){
  const r=RAREZA_SCORE[a.rareza]||1; // 1-6
  const t=5-a.tier; // tier I=4, IV=1
  return (r/6)*70 + (t/4)*30;
}

// penalización para armas sin rareza definida
const RAREZA_PENALIZADA=new Set(['N/A','TBA']);
function penalizacion(a){return RAREZA_PENALIZADA.has(a.rareza)?0.7:1.0;}

// score balanceado: DPS sostenido + tier como multiplicador + penalización N/A/TBA
function scoreBalanceado(a){
  const dps=calcDPSSostenido(a);
  const tierMult={1:0.7,2:0.85,3:1.0,4:1.2}[a.tier]||1.0;
  return dps * tierMult * penalizacion(a);
}

// normaliza scores de 0-1 para cada modo
function normalizeScores(list,scoreFn){
  const scores=list.map(a=>scoreFn(a));
  const max=Math.max(...scores)||1;
  const min=Math.min(...scores);
  return list.map((a,i)=>({a,norm:max===min?1:(scores[i]-min)/(max-min)}));
}

function renderRanking(){
  const panel=document.getElementById('rankingPanel');

  // checkboxes de modos
  const checks=Object.entries(RANK_MODES).map(([k,v])=>{
    const on=activeRankModes.has(k);
    return`<button class="rank-check-label${on?' checked':''}" onclick="toggleRankMode('${k}')">
      <span class="rank-check-dot"></span>${v.label()}
    </button>`;
  }).join('');

  // toggle N/A y TBA
  const toggleNA=`<button class="rank-check-label${rankShowNA?' checked':''}" onclick="rankShowNA=!rankShowNA;renderRanking()">
    <span class="rank-check-dot"></span>${lang==='es'?'Incluir N/A y TBA':'Include N/A & TBA'}
  </button>`;

  if(!activeRankModes.size){
    panel.innerHTML=`<div class="rank-checks">${checks}<div style="width:1px;height:22px;background:var(--border);margin:0 4px;align-self:center"></div>${toggleNA}</div><div class="rank-no-sel">// ${lang==='es'?'Selecciona al menos un modo':'Select at least one mode'}</div>`;
    return;
  }

  const desc=[...activeRankModes].map(k=>RANK_MODES[k].desc()).join(' · ');
  const activeModes=[...activeRankModes];

  // candidatos: filtrar N/A y TBA si el toggle está off
  let candidates=allArmas();
  if(!rankShowNA) candidates=candidates.filter(a=>!RAREZA_PENALIZADA.has(a.rareza));
  if(activeRankModes.has('casual')) candidates=candidates.filter(a=>a.tier<=2&&['comun','poco_comun','inusual'].includes(a.rareza));
  if(activeRankModes.has('spc')) candidates=candidates.filter(a=>a.reserva_maxima>=20);

  const perMode=activeModes.map(k=>{
    const fn=RANK_MODES[k].scoreFn;
    const vals=candidates.map(a=>Math.max(0,fn(a)));
    const max=Math.max(...vals)||1, min=Math.min(...vals);
    return candidates.map((_,i)=>max===min?1:(vals[i]-min)/(max-min));
  });

  const combined=candidates.map((a,ci)=>{
    const s=activeModes.reduce((acc,_,mi)=>acc+perMode[mi][ci],0)/activeModes.length;
    return{...a,_score:s};
  }).sort((a,b)=>b._score-a._score);

  const maxScore=combined[0]?._score||1;

  const rows=combined.map((a,i)=>{
    const tc=TIER_COLORS[a.tier]||'#555';
    const pc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const pct=(a._score/maxScore*100).toFixed(1);
    const scoreDisp=activeModes.length===1
      ?RANK_MODES[activeModes[0]].labelFn(a)
      :(a._score*100).toFixed(1)+' pts';
    const naTag=RAREZA_PENALIZADA.has(a.rareza)?`<span style="font-family:'Share Tech Mono',monospace;font-size:.62rem;color:#666;margin-left:4px">${a.rareza}</span>`:'';
    return`<div class="ranking-row" style="--tier-color:${tc}">
      <span class="ranking-pos ${pc}">#${i+1}</span>
      <span class="ranking-nombre">${a.nombre}${naTag}</span>
      <span class="ranking-cat">${CAT_LABELS(a._cat)}</span>
      <div class="ranking-bar-bg"><div class="ranking-bar-fill" style="width:${pct}%"></div></div>
      <span class="ranking-score">${scoreDisp}</span>
    </div>`;
  }).join('');

  const title=activeModes.length===1?RANK_MODES[activeModes[0]].label():(lang==='en'?`Combined Score (${activeModes.length} modes)`:`Score Combinado (${activeModes.length} modos)`);
  panel.innerHTML=`<div class="rank-checks">${checks}<div style="width:1px;height:22px;background:var(--border);margin:0 4px;align-self:center"></div>${toggleNA}</div><div class="rank-active-desc">${desc}</div><div class="ranking-title">// ${title}</div>${rows}`;
}

function toggleRankMode(k){
  if(activeRankModes.has(k)) activeRankModes.delete(k);
  else activeRankModes.add(k);
  renderRanking();
}

// ── COMPARADOR STATS ──
function compColHTML(a,rival){
  if(!a)return`<div class="comp-placeholder">// ${lang==='en'?'Select a weapon from Arsenal':'Selecciona un arma desde Arsenal'}</div>`;
  const tc=TIER_COLORS[a.tier]||'#555';
  const en=lang==='en';
  const dps=efectivoDPS(a),ttk=calcTTK(a);
  const rdps=rival?efectivoDPS(rival):null,rttk=rival?calcTTK(rival):null;
  function cls(val,rval,hib=true){if(rval===null||rval===undefined)return'';const v=parseFloat(val)||0,r=parseFloat(rval)||0;if(v===r)return'';return(hib?(v>r):(v<r))?'win':'lose';}
  const rows=[
    ['Tier',`Tier ${TIER_ROMAN[a.tier]||a.tier}`,null,true],
    [en?'Head dmg':'Dmg cabeza',a.dano_cabeza,rival?.dano_cabeza,true],
    [en?'Body dmg':'Dmg cuerpo',a.dano_cuerpo,rival?.dano_cuerpo,true],
    [en?'Fire Rate':'Cadencia',a.cadencia,rival?.cadencia,true],
    [en?'Spread':'Difusión',a.difusion,rival?.difusion,false],
    ['DPS',dps.toFixed(1),rdps?.toFixed(1),true],
    [en?'Sustained DPS':'DPS Sostenido',calcDPSSostenido(a).toFixed(1),rival?calcDPSSostenido(rival).toFixed(1):null,true],
    ['TTK (100hp)',fmtTTK(ttk),rttk!==null?fmtTTK(rttk):null,false],
    [en?'Magazine':'Cargador',a.cargador,rival?.cargador,true],
    [en?'Reserve':'Reserva',a.reserva_maxima,rival?.reserva_maxima,true],
    ['Recoil X',a.recoil.x,rival?.recoil.x,false],
    ['Recoil Y',a.recoil.y,rival?.recoil.y,false],
  ];
  if(a.balas_por_disparo!=null)rows.splice(3,0,[en?'Pellets/shot':'Balas/disparo',a.balas_por_disparo,null,true]);
  const rowsHTML=rows.map(([lbl,val,rval,hib])=>`<div class="comp-stat-row"><span class="comp-stat-label">${lbl}</span><span class="comp-stat-val ${cls(val,rval,hib)}">${val}</span></div>`).join('');
  return`<div class="comp-col" style="--tier-color:${tc}"><div class="comp-col-nombre">${a.nombre}</div><div class="badges" style="margin-bottom:10px">${badgeTier(a.tier)}${badgeRareza(a.rareza)}</div>${rowsHTML}</div>`;
}

// ── SIMULACIÓN ──
// ── DISTANCIAS ──
// distMult: cuánto amplifica la difusión el chance de fallo
// recoilMult: cuánto pesa el recoil acumulado
const DIST_MODES={
  cerca: {label:()=>lang==='en'?'Close (CQB)':'Cerca (CQB)',  distMult:0.4, recoilMult:0.3, desc:()=>lang==='en'?'Spread barely matters, recoil almost irrelevant.':'Poca difusión importa, el recoil casi no pesa.'},
  medio: {label:()=>lang==='en'?'Medium':'Medio',              distMult:1.0, recoilMult:0.7, desc:()=>lang==='en'?'Balanced — spread and recoil both matter.':'Balance entre difusión y control del recoil.'},
  lejos: {label:()=>lang==='en'?'Long Range':'Lejos',          distMult:2.2, recoilMult:1.2, desc:()=>lang==='en'?'Spread heavily penalized, accumulated recoil hurts.':'Difusión penaliza fuerte, recoil acumulado duele.'},
};

// chance de fallar un disparo:
function calcMissChance(arma, recoilAcum, dist){
  const dm=DIST_MODES[dist];
  const difFactor = arma.difusion * dm.distMult * 0.06;  // difusion 1 a distancia media = 6%
  const recoilFactor = recoilAcum * dm.recoilMult * 0.018;
  return Math.min(0.65, difFactor + recoilFactor);
}

// recoil acumulado sube con cada disparo, decae con el tiempo entre disparos
function tickRecoil(recoilAcum, arma, msSinceLastShot){
  const kickY = arma.recoil.y;
  const kickX = arma.recoil.x;
  const kick = (kickY * 0.7 + kickX * 0.3);  // Y pesa más que X
  const decay = msSinceLastShot * 0.003;       // recuperación ~333ms para 1 punto
  return Math.max(0, recoilAcum - decay) + kick;
}

function simularCombate(a,b,hp,dist){
  hp=hp||HP;
  dist=dist||simDist;
  let hpA=hp,hpB=hp;
  let tickA=0,tickB=0;
  let lastShotA=0,lastShotB=0;
  let recoilAcumA=0,recoilAcumB=0;
  const msPerBalaA=60000/a.cadencia;
  const msPerBalaB=60000/b.cadencia;
  // daño base por disparo
  const dmgBaseA=(a.balas_por_disparo&&a.balas_por_disparo!=='TBA')?a.dano_cuerpo*a.balas_por_disparo*0.4:a.dano_cuerpo;
  const dmgBaseB=(b.balas_por_disparo&&b.balas_por_disparo!=='TBA')?b.dano_cuerpo*b.balas_por_disparo*0.4:b.dano_cuerpo;
  const log=[];
  let t=0;
  const maxT=30000;
  let hitsA=0,missA=0,hitsB=0,missB=0;
  while(hpA>0&&hpB>0&&t<maxT){
    const next=Math.min(tickA<=t?t:tickA,tickB<=t?t:tickB);
    t=Math.max(t,next);
    if(tickA<=t){
      recoilAcumA=tickRecoil(recoilAcumA,a,t-lastShotA);
      lastShotA=t;
      const miss=Math.random()<calcMissChance(a,recoilAcumA,dist);
      if(miss){missA++;log.push({t,who:'A',miss:true,hpA,hpB,recoil:recoilAcumA.toFixed(1)});}
      else{hitsA++;hpB=Math.max(0,hpB-dmgBaseA);log.push({t,who:'A',miss:false,dmg:dmgBaseA,hpA,hpB,recoil:recoilAcumA.toFixed(1)});}
      tickA=t+msPerBalaA;
      if(hpB<=0)break;
    }
    if(tickB<=t&&hpA>0&&hpB>0){
      recoilAcumB=tickRecoil(recoilAcumB,b,t-lastShotB);
      lastShotB=t;
      const miss=Math.random()<calcMissChance(b,recoilAcumB,dist);
      if(miss){missB++;log.push({t,who:'B',miss:true,hpA,hpB,recoil:recoilAcumB.toFixed(1)});}
      else{hitsB++;hpA=Math.max(0,hpA-dmgBaseB);log.push({t,who:'B',miss:false,dmg:dmgBaseB,hpA,hpB,recoil:recoilAcumB.toFixed(1)});}
      tickB=t+msPerBalaB;
      if(hpA<=0)break;
    }
  }
  const totalA=hitsA+missA,totalB=hitsB+missB;
  const accA=totalA?((hitsA/totalA)*100).toFixed(0):100;
  const accB=totalB?((hitsB/totalB)*100).toFixed(0):100;
  return{log,hpA:Math.max(0,hpA),hpB:Math.max(0,hpB),timeMs:t,accA,accB,hitsA,missA,hitsB,missB};
}

function renderSimHTML(a,b){
  if(!a||!b)return`<div class="comp-placeholder" style="grid-column:1/-1">// Selecciona 2 armas para simular</div>`;
  const res=simularCombate(a,b,simHP,simDist);
  const winner=res.hpA>0&&res.hpB<=0?'A':res.hpB>0&&res.hpA<=0?'B':'DRAW';
  const hpAp=(res.hpA/simHP*100).toFixed(0);
  const hpBp=(res.hpB/simHP*100).toFixed(0);
  const hpAcol=res.hpA>simHP*0.5?'#78c97a':res.hpA>simHP*0.25?'#c8a84b':'#e0845b';
  const hpBcol=res.hpB>simHP*0.5?'#78c97a':res.hpB>simHP*0.25?'#c8a84b':'#e0845b';
  const logLines=res.log.slice(-50).map(l=>{
    const who=l.who==='A'?a.nombre:b.nombre;
    const cls=l.who==='A'?'hit-a':'hit-b';
    if(l.miss) return`<div class="sim-log-line ${cls} miss">[${(l.t/1000).toFixed(2)}s] ${who} → ${lang==='en'?'MISS':'FALLO'} (recoil:${l.recoil}) | HP A:${l.hpA.toFixed(0)} HP B:${l.hpB.toFixed(0)}</div>`;
    return`<div class="sim-log-line ${cls}">[${(l.t/1000).toFixed(2)}s] ${who} → -${l.dmg.toFixed(1)} (recoil:${l.recoil}) | HP A:${l.hpA.toFixed(0)} HP B:${l.hpB.toFixed(0)}</div>`;
  }).join('');
  const resClass=winner==='A'?'win-a':winner==='B'?'win-b':'draw';
  const resText=winner==='A'?`▶ GANADOR: ${a.nombre}`:winner==='B'?`▶ GANADOR: ${b.nombre}`:'▶ EMPATE';
  const tcA=TIER_COLORS[a.tier]||'#555', tcB=TIER_COLORS[b.tier]||'#555';
  const hpOpts=[100,200,500,1000,2000].map(v=>`<option value="${v}"${v===simHP?' selected':''}>${v} HP</option>`).join('');
  const distOpts=Object.entries(DIST_MODES).map(([k,v])=>`<option value="${k}"${k===simDist?' selected':''}>${v.label()}</option>`).join('');
  const distInfo=DIST_MODES[simDist];
  const en=lang==='en';
  // chance de fallo aproximado a 0 recoil para mostrar info
  const baseMissA=(calcMissChance(a,0,simDist)*100).toFixed(0);
  const baseMissB=(calcMissChance(b,0,simDist)*100).toFixed(0);
  const ganador=winner==='A'?`▶ ${en?'WINNER':'GANADOR'}: ${a.nombre}`:winner==='B'?`▶ ${en?'WINNER':'GANADOR'}: ${b.nombre}`:`▶ ${en?'DRAW':'EMPATE'}`;
  return`
  <div class="sim-controls">
    <select class="select-styled" onchange="simHP=parseInt(this.value);rerenderSim()">${hpOpts}</select>
    <select class="select-styled" onchange="simDist=this.value;rerenderSim()">${distOpts}</select>
    <button class="sim-btn" onclick="rerenderSim()">↺ ${en?'Simulate':'Simular'}</button>
  </div>
  <div class="sim-note">${distInfo.desc()} — ${en?'Spread and recoil affect accuracy. Results vary each simulation.':'Difusión y recoil afectan precisión. Los resultados varían cada simulación.'}</div>
  <div class="sim-side" style="--tier-color:${tcA}">
    <div class="sim-name">${a.nombre}</div>
    <div class="sim-hp-bar-bg"><div class="sim-hp-bar" style="width:${hpAp}%;background:${hpAcol}"></div></div>
    <div class="sim-hp-text">${res.hpA.toFixed(0)} / ${simHP} HP</div>
    <div class="sim-stat-mini"><span class="sim-stat-lbl">${en?'Accuracy':'Precisión'}</span><span class="sim-stat-val" style="color:${parseInt(res.accA)>70?'#78c97a':parseInt(res.accA)>50?'#c8a84b':'#e0845b'}">${res.accA}%</span></div>
    <div class="sim-stat-mini"><span class="sim-stat-lbl">${en?'Hits':'Impactos'}</span><span class="sim-stat-val">${res.hitsA} / ${res.hitsA+res.missA}</span></div>
    <div class="sim-stat-mini"><span class="sim-stat-lbl">${en?'Base miss':'Fallo base'}</span><span class="sim-stat-val">${baseMissA}%</span></div>
  </div>
  <div class="sim-side" style="--tier-color:${tcB}">
    <div class="sim-name">${b.nombre}</div>
    <div class="sim-hp-bar-bg"><div class="sim-hp-bar" style="width:${hpBp}%;background:${hpBcol}"></div></div>
    <div class="sim-hp-text">${res.hpB.toFixed(0)} / ${simHP} HP</div>
    <div class="sim-stat-mini"><span class="sim-stat-lbl">${en?'Accuracy':'Precisión'}</span><span class="sim-stat-val" style="color:${parseInt(res.accB)>70?'#78c97a':parseInt(res.accB)>50?'#c8a84b':'#e0845b'}">${res.accB}%</span></div>
    <div class="sim-stat-mini"><span class="sim-stat-lbl">${en?'Hits':'Impactos'}</span><span class="sim-stat-val">${res.hitsB} / ${res.hitsB+res.missB}</span></div>
    <div class="sim-stat-mini"><span class="sim-stat-lbl">${en?'Base miss':'Fallo base'}</span><span class="sim-stat-val">${baseMissB}%</span></div>
  </div>
  <div class="sim-log">${logLines||`<span style="color:#555">// ${en?'no shots recorded':'sin disparos registrados'}</span>`}</div>
  <div class="sim-result ${resClass}">${ganador} — ${(res.timeMs/1000).toFixed(2)}s</div>`;
}

function rerenderSim(){
  const [s1,s2]=compareSlots;
  let a1=null,a2=null;
  if(s1){const[c,n]=s1.split('::');a1=findArma(c,n);}
  if(s2){const[c,n]=s2.split('::');a2=findArma(c,n);}
  document.getElementById('simContent').innerHTML=renderSimHTML(a1,a2);
}

function renderComparador(){
  const panel=document.getElementById('comparadorPanel');
  const [s1,s2]=compareSlots;
  let a1=null,a2=null;
  if(s1){const[c,n]=s1.split('::');a1=findArma(c,n);}
  if(s2){const[c,n]=s2.split('::');a2=findArma(c,n);}
  const en=lang==='en';
  const hint=compareSlots.length===0?(en?'Select 2 weapons from Arsenal':'Selecciona 2 armas desde Arsenal'):compareSlots.length===1?(en?'Select a second weapon':'Selecciona una segunda arma'):'';
  const modeTabs=`<div class="comp-mode-tabs">
    <button class="comp-mode-tab${compMode==='stats'?' active':''}" onclick="setCompMode('stats')">Stats</button>
    <button class="comp-mode-tab${compMode==='sim'?' active':''}" onclick="setCompMode('sim')">${en?'Combat Test':'Prueba de Disparo'}</button>
  </div>`;
  let content='';
  if(compMode==='stats'){
    content=`<div class="comp-grid">${compColHTML(a1,a2)}<div class="comp-mid"><span class="comp-vs">VS</span></div>${compColHTML(a2,a1)}</div>`;
  } else {
    content=`<div class="sim-wrap" id="simContent">${renderSimHTML(a1,a2)}</div>`;
  }
  panel.innerHTML=`<div class="comp-title">// ${lang==='en'?'Comparator':'Comparador'} <span class="comp-hint">${hint}</span></div>${modeTabs}${content}`;
}

function setCompMode(m){compMode=m;renderComparador();}

// ── VIEWS ──
function setView(v){
  currentView=v;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  document.getElementById('contenedor').style.display=v==='armas'?'':'none';
  document.getElementById('inicioPanel').style.display=v==='inicio'?'block':'none';
  document.getElementById('rankingPanel').style.display=v==='ranking'?'block':'none';
  document.getElementById('comparadorPanel').style.display=v==='comparador'?'block':'none';
  document.getElementById('toolbar').style.display=v==='armas'?'':'none';
  document.getElementById('searchbarWrap').style.display=v==='armas'?'':'none';
  if(v==='inicio')    renderInicio();
  if(v==='ranking')   renderRanking();
  if(v==='comparador')renderComparador();
  if(v==='armas')     renderArsenalView();
}

// ── BUILD TOOLBAR ──
const toolbar=document.getElementById('toolbar');
for(const cat in ARMAS){
  const btn=document.createElement('button');btn.className='filter-btn';btn.dataset.filter=cat;btn.textContent=CAT_LABELS(cat);toolbar.appendChild(btn);
}
toolbar.addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');if(!btn)return;
  toolbar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');currentCat=btn.dataset.filter;renderArsenalView();
});

document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderArsenalView();});
document.getElementById('rarezaFilter').addEventListener('change',e=>{currentRareza=e.target.value;renderArsenalView();});
document.getElementById('tierFilter').addEventListener('change',e=>{currentTier=e.target.value;renderArsenalView();});
document.getElementById('sortFilter').addEventListener('change',e=>{currentSort=e.target.value;renderArsenalView();});
document.getElementById('btnComparar').addEventListener('click',()=>setView('comparador'));
document.querySelectorAll('.view-tab').forEach(t=>t.addEventListener('click',()=>setView(t.dataset.view)));

setView('inicio');
</script>
